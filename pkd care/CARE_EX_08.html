<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>소형견 운동 가이드 — 펫키디피아</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --cream: #FBF7F2; --green: #2E7D32; --green-pale: #E8F5E9; --brown: #2E1F14;
      --soft: #EDE4D8; --muted: #9B8878; --max: 680px; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: "Noto Sans KR", sans-serif; background: var(--cream); color: var(--brown); line-height: 1.8; }
    .container { max-width: var(--max); margin: 0 auto; padding: 20px 20px 120px; }
    .hero { padding: 40px 0 32px; text-align: center; }
    .hero-badge { background: var(--green-pale); color: var(--green); font-size: 11px; font-weight: 700;
      padding: 6px 14px; border-radius: 20px; margin-bottom: 16px; display: inline-block; }
    h1 { font-size: 26px; font-weight: 700; margin-bottom: 12px; }
    h2 { font-size: 20px; font-weight: 700; margin: 24px 0 14px; }
    .card { background: #fff; border: 1px solid var(--soft); border-radius: 18px; padding: 20px; margin-bottom: 14px; }
  </style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="hero-badge">CARE · Exercise</div>
    <h1>소형견 운동 가이드</h1>
    <p style="font-size: 14px; color: var(--muted);">30~60분 적당. 과격한 운동 피하기!</p>
  </div>

  <h2>권장 운동</h2>
  <div class="card">
    <p><strong>① 짧은 산책</strong> — 하루 1~2회, 각 15~30분<br>
    <strong>② 실내 놀이</strong> — 터그·노즈워크<br>
    <strong>③ 사회화</strong> — 다른 강아지 만남</p>
  </div>

  <h2>주의사항</h2>
  <div class="card">
    <p>• <strong>슬개골 탈구</strong> — 점프·계단 주의<br>
    • <strong>기관지 허탈</strong> — 목줄보다 하네스 사용<br>
    • <strong>과체중</strong> — 소형견도 운동 필요!</p>
  </div>

  <h2>피해야 할 운동</h2>
  <div class="card">
    <p>• 소파·침대에서 뛰어내리기<br>
    • 계단 빠르게 오르내리기<br>
    • 긴 하이킹 (체력 부족)</p>
  </div>

  <div style="margin-top: 40px; text-align: center; font-size: 11px; color: var(--muted);">
    <p>CARE_EX_08 · 펫키디피아 Care Guide</p>
  </div>
</div>
</body>
</html>
