<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>미용실 방문 준비 가이드 — 펫키디피아</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --cream: #FBF7F2; --blue: #1976D2; --blue-pale: #E3F2FD; --brown: #2E1F14;
      --soft: #EDE4D8; --muted: #9B8878; --max: 680px; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: "Noto Sans KR", sans-serif; background: var(--cream); color: var(--brown); line-height: 1.8; }
    .container { max-width: var(--max); margin: 0 auto; padding: 20px 20px 120px; }
    .hero { padding: 40px 0 32px; text-align: center; }
    .hero-badge { background: var(--blue-pale); color: var(--blue); font-size: 11px; font-weight: 700;
      padding: 6px 14px; border-radius: 20px; margin-bottom: 16px; display: inline-block; }
    h1 { font-size: 26px; font-weight: 700; margin-bottom: 12px; }
    h2 { font-size: 20px; font-weight: 700; margin: 24px 0 14px; }
    .card { background: #fff; border: 1px solid var(--soft); border-radius: 18px; padding: 20px; margin-bottom: 14px; }
  </style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="hero-badge">CARE · Home</div>
    <h1>미용실 방문 준비 가이드</h1>
    <p style="font-size: 14px; color: var(--muted);">미용은 스트레스. 적응이 필요해요.</p>
  </div>

  <h2>집에서 미리 연습</h2>
  <div class="card">
    <p>• 브러싱 습관화<br>
    • 발·귀·꼬리 만지기<br>
    • 드라이기 소리 적응<br>
    • 가위 소리 적응</p>
  </div>

  <h2>미용실 선택</h2>
  <div class="card">
    <p>• 퍼피 경험 많은 곳<br>
    • 마취 없는 곳<br>
    • 1:1 미용<br>
    • 리뷰 확인</p>
  </div>

  <h2>첫 미용 팁</h2>
  <div class="card">
    <p>• 짧게 (30분 이내)<br>
    • 부분 미용만 (발·얼굴)<br>
    • 간식 챙겨주기<br>
    • 보호자 동행</p>
  </div>

  <h2>미용 주기</h2>
  <div class="card">
    <p><strong>장모종:</strong> 4~6주<br>
    <strong>단모종:</strong> 6~8주<br>
    <strong>목욕만:</strong> 2~4주</p>
  </div>

  <div style="margin-top: 40px; text-align: center; font-size: 11px; color: var(--muted);">
    <p>CARE_HOME_09 · 펫키디피아 Care Guide</p>
  </div>
</div>
</body>
</html>
