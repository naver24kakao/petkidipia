<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --cream:#FBF7F2; --cream2:#F5EFE6;
  --gold:#C9A84C;  --gold2:#E8C96A;
  --brown:#2E1F14; --brown2:#3D2B1F;
  --warm:#8B5E3C;  --soft:#EDE4D8;
  --muted:#9B8878;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--cream);color:var(--brown2);}

/* ── 상단 ── */
.top-bar{
  background:var(--brown);padding:14px 20px;
  display:flex;align-items:center;gap:14px;
  position:sticky;top:0;z-index:40;
}
.back-btn{
  width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,0.1);border:none;
  color:#fff;font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.top-logo{
  font-family:'Cormorant Garamond',serif;
  font-size:17px;color:var(--gold);font-weight:600;flex:1;
}

/* ── 히어로 ── */
.hero{
  background:var(--brown);padding:22px 20px 26px;
  text-align:center;position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;top:-80px;left:50%;
  transform:translateX(-50%);width:340px;height:340px;
  border-radius:50%;background:rgba(201,168,76,0.07);
}
.hero-eyebrow{font-size:10px;letter-spacing:3px;color:rgba(201,168,76,0.6);font-weight:700;margin-bottom:8px;}
.hero-title{
  font-family:'Cormorant Garamond',serif;
  font-size:28px;font-weight:300;color:#fff;
  line-height:1.2;margin-bottom:5px;position:relative;z-index:1;
}
.hero-title em{font-style:italic;color:var(--gold);}
.hero-sub{font-size:12px;color:rgba(255,255,255,0.4);position:relative;z-index:1;}

/* ════════════════════════
   공통 기본정보 블록 (스티키)
════════════════════════ */
.base-block{
  background:var(--cream2);
  border-bottom:1px solid var(--soft);
  padding:14px 16px;
  position:sticky;top:62px;z-index:30;
}

/* 견종 + 사이즈 행 */
.base-selects{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.base-field-label{
  font-size:9px;font-weight:700;letter-spacing:1.5px;
  color:var(--muted);margin-bottom:5px;
}
.base-select{
  width:100%;padding:10px 12px;
  border:1.5px solid var(--soft);border-radius:12px;
  background:#fff;color:var(--brown2);
  font-size:13px;font-family:'Noto Sans KR',sans-serif;
  outline:none;cursor:pointer;appearance:none;
  transition:border-color 0.2s;
}
.base-select:focus{border-color:var(--gold);}

/* ── 계산기 탭 ── */
.calc-nav{
  display:flex;background:#fff;
  border-bottom:2px solid var(--soft);
  overflow-x:auto;scrollbar-width:none;
  position:sticky;top:62px;z-index:20;
}
/* 기본정보 블록 높이만큼 top 조정은 JS로 */
.calc-nav::-webkit-scrollbar{display:none;}
.calc-nav-btn{
  flex:1;min-width:72px;padding:12px 6px;
  border:none;background:#fff;
  font-size:10px;font-weight:700;color:var(--muted);
  cursor:pointer;font-family:'Noto Sans KR',sans-serif;
  border-bottom:2px solid transparent;margin-bottom:-2px;
  transition:all 0.2s;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
.calc-nav-btn .nav-icon{font-size:18px;}
.calc-nav-btn.active{color:var(--brown);border-bottom-color:var(--gold);}

/* ── 패널 ── */
.calc-panel{display:none;padding:14px 14px 90px;}
.calc-panel.show{display:block;animation:fadeUp 0.3s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

/* ── 결과 디스플레이 ── */
.result-display{
  background:var(--brown);border-radius:22px;
  padding:22px 18px;margin-bottom:14px;
  position:relative;overflow:hidden;text-align:center;
}
.result-display::before{
  content:'';position:absolute;top:-50px;right:-50px;
  width:180px;height:180px;border-radius:50%;
  background:rgba(201,168,76,0.08);
}
.result-eyebrow{
  font-size:9px;letter-spacing:2.5px;
  color:rgba(201,168,76,0.6);font-weight:700;margin-bottom:12px;
}
.result-main{
  display:flex;justify-content:center;gap:10px;
  flex-wrap:wrap;margin-bottom:12px;position:relative;z-index:1;
}
.result-box{
  text-align:center;background:rgba(255,255,255,0.07);
  border-radius:14px;padding:13px 14px;min-width:80px;
}
.result-box-label{font-size:9px;color:rgba(255,255,255,0.4);margin-bottom:5px;}
.result-box-val{
  font-family:'Cormorant Garamond',serif;
  font-size:34px;font-weight:300;color:var(--gold);line-height:1;
}
.result-box-unit{font-size:11px;color:rgba(255,255,255,0.4);margin-top:3px;}
.result-desc{
  font-size:12px;color:rgba(255,255,255,0.5);
  line-height:1.7;position:relative;z-index:1;font-weight:300;
}
.result-desc strong{color:var(--gold2);font-weight:700;}
.stage-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--gold);color:var(--brown);
  font-size:10px;font-weight:700;
  padding:4px 12px;border-radius:16px;margin-top:6px;
}

/* ── 입력 카드 ── */
.input-card{
  background:#fff;border-radius:18px;
  padding:18px;box-shadow:0 3px 14px rgba(46,31,20,0.06);
  margin-bottom:12px;
}
.input-card-title{
  font-size:12px;font-weight:700;color:var(--brown);
  margin-bottom:14px;display:flex;align-items:center;gap:8px;
}
.field-row{display:flex;flex-direction:column;gap:12px;}
.field{display:flex;flex-direction:column;gap:6px;}
.field-label{font-size:10px;font-weight:700;color:var(--warm);letter-spacing:0.5px;}
.field-input{
  width:100%;padding:12px 14px;
  border:1.5px solid var(--soft);border-radius:13px;
  font-size:14px;color:var(--brown2);
  font-family:'Noto Sans KR',sans-serif;
  background:var(--cream);outline:none;
  transition:border-color 0.2s;
}
.field-input:focus{border-color:var(--gold);}

/* 슬라이더 */
.slider-val{
  text-align:center;
  font-family:'Cormorant Garamond',serif;
  font-size:28px;font-weight:300;color:var(--brown);margin-bottom:5px;
}
.slider-val span{font-size:13px;color:var(--muted);}
.field-slider{
  width:100%;appearance:none;height:7px;
  border-radius:10px;background:var(--soft);outline:none;cursor:pointer;
}
.field-slider::-webkit-slider-thumb{
  appearance:none;width:24px;height:24px;border-radius:50%;
  background:var(--brown);border:3px solid var(--gold);
  cursor:pointer;box-shadow:0 3px 10px rgba(46,31,20,0.22);
  transition:transform 0.15s;
}
.field-slider::-webkit-slider-thumb:hover{transform:scale(1.12);}
.slider-minmax{
  display:flex;justify-content:space-between;
  font-size:9px;color:var(--muted);padding:0 2px;margin-top:4px;
}

/* 옵션 버튼 */
.btn-group{display:flex;gap:7px;}
.btn-opt{
  flex:1;padding:10px 6px;
  border:1.5px solid var(--soft);border-radius:13px;
  background:var(--cream);font-size:11px;font-weight:700;
  color:var(--muted);cursor:pointer;text-align:center;
  font-family:'Noto Sans KR',sans-serif;transition:all 0.2s;
}
.btn-opt .opt-icon{font-size:17px;margin-bottom:3px;}
.btn-opt:hover{border-color:var(--gold);}
.btn-opt.selected{background:var(--brown);border-color:var(--brown);color:#fff;}

/* 비용 내역 */
.cost-breakdown{
  background:#fff;border-radius:18px;
  padding:18px;box-shadow:0 3px 14px rgba(46,31,20,0.06);
  margin-bottom:12px;
}
.cost-section-title{
  font-size:10px;letter-spacing:2px;
  color:var(--gold);font-weight:700;margin-bottom:12px;
}
.cost-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:9px 0;border-bottom:1px solid #F5F0EB;
}
.cost-item:last-child{border-bottom:none;}
.cost-item-left{display:flex;align-items:center;gap:10px;}
.cost-item-icon{font-size:17px;}
.cost-item-name{font-size:12px;color:var(--brown2);}
.cost-item-note{font-size:9px;color:var(--muted);margin-top:1px;}
.cost-item-val{
  font-family:'Cormorant Garamond',serif;
  font-size:17px;font-weight:600;color:var(--brown);
}
.cost-total{
  background:var(--soft);border-radius:13px;
  padding:13px 15px;display:flex;
  justify-content:space-between;align-items:center;margin-top:12px;
}
.cost-total-label{font-size:12px;font-weight:700;color:var(--brown);}
.cost-total-val{
  font-family:'Cormorant Garamond',serif;
  font-size:24px;font-weight:600;color:var(--warm);
}

/* 인포박스 */
.info-box{
  background:var(--soft);border-radius:13px;
  padding:13px 15px;display:flex;
  align-items:flex-start;gap:11px;margin-bottom:12px;
}
.info-box-icon{font-size:18px;flex-shrink:0;}
.info-box-text{font-size:11px;line-height:1.7;color:var(--warm);}
.info-box-text strong{font-weight:700;display:block;margin-bottom:2px;color:var(--brown);}

/* BCS 가이드 */
.bcs-row{
  display:flex;gap:10px;align-items:center;
  padding:9px 0;border-bottom:1px solid #F5F0EB;
}
.bcs-row:last-child{border-bottom:none;}
.bcs-icon{font-size:18px;flex-shrink:0;}
.bcs-title{font-size:12px;font-weight:700;color:var(--brown);margin-bottom:2px;}
.bcs-desc{font-size:10px;color:var(--muted);}
.badge{font-size:9px;font-weight:700;padding:3px 9px;border-radius:9px;white-space:nowrap;margin-left:auto;flex-shrink:0;}
.badge-r{background:#FFE8E8;color:#C0392B;}
.badge-g{background:#E8F5E9;color:#2E7D32;}
.badge-a{background:#FFF3E0;color:#E65100;}
</style>
</head>
